services:

  db:
    image: mysql:8.0
    restart: unless-stopped
    networks:
      - grant_net
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-grant_docs}
      MYSQL_USER:          ${MYSQL_USER:-grant_docs}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      # install.sql runs automatically on first start (empty data volume)
      - ./install.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  app:
    build: .
    restart: unless-stopped
    networks:
      - grant_net
      - app-net
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=app-net"
      # HTTPS
      - "traefik.http.routers.grant-docs.rule=Host(`bldg.srv1353823.hstgr.cloud`)"
      - "traefik.http.routers.grant-docs.entrypoints=websecure"
      - "traefik.http.routers.grant-docs.tls=true"
      - "traefik.http.routers.grant-docs.tls.certresolver=mytlschallenge"
      - "traefik.http.services.grant-docs.loadbalancer.server.port=8000"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.grant-docs-http.rule=Host(`bldg.srv1353823.hstgr.cloud`)"
      - "traefik.http.routers.grant-docs-http.entrypoints=web"
      - "traefik.http.routers.grant-docs-http.middlewares=grant-https-redirect"
      - "traefik.http.middlewares.grant-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.grant-https-redirect.redirectscheme.permanent=true"
    environment:
      MYSQL_HOST:     db
      MYSQL_PORT:     3306
      MYSQL_USER:     ${MYSQL_USER:-grant_docs}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-grant_docs}
      SECRET_KEY:     ${SECRET_KEY}
      LOG_LEVEL:      ${LOG_LEVEL:-INFO}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
      COMPARISON_TIMEOUT_MINUTES: ${COMPARISON_TIMEOUT_MINUTES:-60}
      GEMINI_SLEEP_SECONDS:       ${GEMINI_SLEEP_SECONDS:-1.0}
      GEMINI_BATCH_SECTIONS:      ${GEMINI_BATCH_SECTIONS:-20}
      GOOGLE_CLIENT_ID:           ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET:       ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI:        ${GOOGLE_REDIRECT_URI:-}
      DEV_BYPASS_AUTH:            ${DEV_BYPASS_AUTH:-}
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs

volumes:
  mysql_data:

networks:
  grant_net:
    driver: bridge
  app-net:
    external: true
